<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To Do List</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f4f4f4;
    }

    .container{
      background:white;
      padding:25px;
      width:350px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    .input-box{
      display:flex;
      gap:10px;
    }

    input{
      flex:1;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      padding:20px 15px;
      border:none;
      background:red;
      color:white;
      border-radius:10px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    ul{
      list-style:none;
      margin-top:20px;
    }

    li{
      background:#eee;
      padding:10px;
      margin-bottom:10px;
      border-radius:5px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .delete-btn{
      background:red;
      padding:5px 10px;
      font-size:12px;
    }

    .delete-btn:hover{
      background:darkred;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>To Do List</h2>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter task">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    function addTask() {
      let input = document.getElementById("taskInput");
      let taskText = input.value.trim();

      if(taskText === ""){
        alert("Please enter a task");
        return;
      }

      let li = document.createElement("li");
      li.innerHTML = `
        ${taskText}
        <button class="delete-btn" onclick="removeTask(this)">Delete</button>
      `;

      document.getElementById("taskList").appendChild(li);

      input.value = "";
    }

    function removeTask(button) {
      button.parentElement.remove();
    }
  </script>

</body>
</html>
